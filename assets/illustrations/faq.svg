<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="A question and a resolved answer on a support phone">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#e8f4fb)} .acc{fill:var(--acc,#085d8e)}
    .sacc{fill:none;stroke:var(--acc,#085d8e)} .soft{fill:var(--soft,#e8f4fb)}
    .ok{fill:#1aad55} .ink{fill:#14211f}
    .bub{opacity:0}
    @keyframes q{0%,10%{opacity:0}22%,100%{opacity:1}}
    @keyframes a{0%,50%{opacity:0}62%,100%{opacity:1}}
    .qb{animation:q 3.8s ease-in-out infinite}
    .ab{animation:a 3.8s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){.bub{animation:none;opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="140" cy="152" rx="42" ry="6" opacity="0.06"/>
  <rect fill="#fff" class="sacc" x="92" y="24" width="96" height="126" rx="14" stroke-width="2.5"/>
  <rect class="soft" x="99" y="38" width="82" height="98" rx="5"/>
  <rect class="acc" x="128" y="29" width="24" height="3.4" rx="1.7" opacity="0.4"/>

  <!-- question bubble -->
  <g class="bub qb">
    <rect class="acc" x="116" y="50" width="58" height="26" rx="9"/>
    <rect fill="#fff" x="124" y="59" width="42" height="3.5" rx="1.75" opacity="0.85"/>
    <rect fill="#fff" x="124" y="67" width="30" height="3.5" rx="1.75" opacity="0.85"/>
  </g>
  <!-- answered bubble -->
  <g class="bub ab">
    <rect fill="#fff" class="sacc" x="106" y="88" width="66" height="34" rx="9" stroke-width="2"/>
    <rect class="acc" x="114" y="97"  width="40" height="3.5" rx="1.75" opacity="0.45"/>
    <rect class="acc" x="114" y="105" width="48" height="3.5" rx="1.75" opacity="0.45"/>
    <circle class="ok" cx="152" cy="113" r="6"/>
    <path d="M149 113 l2 2 4 -5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

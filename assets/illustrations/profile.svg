<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="A Passpoint profile is delivered from carrier, MDM or app and installs on the device">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#e8f4fb)} .acc{fill:var(--acc,#0b74b1)}
    .sacc{fill:none;stroke:var(--acc,#0b74b1)} .soft{fill:var(--soft,#e8f4fb)}
    .ok{fill:#1aad55} .ink{fill:#14211f}
    text{font-weight:760} .tm{fill:#60706d;font-weight:700}
    @keyframes pcard{0%,10%{transform:translate(62px,92px);opacity:0}14%{opacity:1}
      48%{transform:translate(194px,90px);opacity:1}56%,100%{transform:translate(194px,90px);opacity:0}}
    @keyframes pcheck{0%,60%{opacity:0}70%,93%{opacity:1}100%{opacity:0}}
    .card{animation:pcard 3.6s linear infinite;opacity:0}
    .check{animation:pcheck 3.6s ease-in-out infinite;opacity:0}
    @media (prefers-reduced-motion: reduce){.card,.check{animation:none}.check{opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="194" cy="146" rx="40" ry="6" opacity="0.06"/>

  <text class="tm" x="20" y="70"  font-size="9" textLength="38" lengthAdjust="spacingAndGlyphs">Carrier</text>
  <text class="tm" x="20" y="92"  font-size="9" textLength="26" lengthAdjust="spacingAndGlyphs">MDM</text>
  <text class="tm" x="20" y="114" font-size="9" textLength="20" lengthAdjust="spacingAndGlyphs">App</text>

  <!-- device -->
  <rect fill="#fff" class="sacc" x="164" y="42" width="60" height="100" rx="13" stroke-width="2.5"/>
  <rect class="soft" x="171" y="54" width="46" height="76" rx="4"/>

  <!-- profile card travelling into the device -->
  <g class="card">
    <rect fill="#fff" class="sacc" x="-24" y="-16" width="48" height="32" rx="5" stroke-width="2"/>
    <circle class="acc" cx="-13" cy="-4" r="5" opacity="0.45"/>
    <rect class="acc" x="-4" y="-7" width="20" height="3" rx="1.5" opacity="0.4"/>
    <rect class="acc" x="-4" y="-1" width="20" height="3" rx="1.5" opacity="0.4"/>
    <rect class="acc" x="-13" y="7" width="26" height="3" rx="1.5" opacity="0.4"/>
  </g>

  <g class="check" transform="translate(194,92)">
    <circle class="ok" cx="0" cy="0" r="14"/>
    <path d="M-6 0 l4 4 8 -9" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text class="tm" x="166" y="152" font-size="10" textLength="84" lengthAdjust="spacingAndGlyphs">Profile installed</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="An A to Z glossary expanding acronyms like ANP, RCOI and EAP">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#ede9fe)} .acc{fill:var(--acc,#5b21b6)}
    .sacc{fill:none;stroke:var(--acc,#5b21b6)} .ink{fill:#14211f}
    text{font-weight:760} .ta{fill:var(--acc,#5b21b6);font-weight:820}
    .efill{fill:var(--acc,#5b21b6);opacity:.85;width:0}
    @keyframes f1{0%,14%{width:0}30%,100%{width:80px}}
    @keyframes f2{0%,36%{width:0}52%,100%{width:72px}}
    @keyframes f3{0%,58%{width:0}74%,100%{width:78px}}
    .e1{animation:f1 4.2s ease-in-out infinite}
    .e2{animation:f2 4.2s ease-in-out infinite}
    .e3{animation:f3 4.2s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){
      .efill{animation:none}.e1{width:80px}.e2{width:72px}.e3{width:78px}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="142" cy="158" rx="84" ry="6" opacity="0.05"/>
  <rect fill="#fff" class="sacc" x="60" y="26" width="160" height="126" rx="10" stroke-width="2.5"/>
  <!-- A-Z thumb tabs -->
  <rect class="acc" x="220" y="40"  width="9" height="18" rx="3" opacity="0.16"/>
  <rect class="acc" x="220" y="64"  width="9" height="18" rx="3" opacity="0.32"/>
  <rect class="acc" x="220" y="88"  width="9" height="18" rx="3" opacity="0.16"/>
  <rect class="acc" x="220" y="112" width="9" height="18" rx="3" opacity="0.16"/>

  <text class="ta" x="76" y="47" font-size="12" textLength="110" lengthAdjust="spacingAndGlyphs">Acronyms A–Z</text>
  <path class="sacc" d="M76 53 h128" stroke-width="1.5" opacity="0.3"/>

  <!-- ANP -->
  <rect class="acc" x="76" y="64" width="42" height="18" rx="4"/>
  <text x="97" y="77" font-size="9.5" font-weight="800" fill="#fff" text-anchor="middle" textLength="28" lengthAdjust="spacingAndGlyphs">ANP</text>
  <rect class="acc" x="126" y="70" width="80" height="6" rx="3" opacity="0.14"/>
  <rect class="efill e1" x="126" y="70" height="6" rx="3"/>
  <!-- RCOI -->
  <rect class="acc" x="76" y="92" width="50" height="18" rx="4"/>
  <text x="101" y="105" font-size="9.5" font-weight="800" fill="#fff" text-anchor="middle" textLength="34" lengthAdjust="spacingAndGlyphs">RCOI</text>
  <rect class="acc" x="134" y="98" width="72" height="6" rx="3" opacity="0.14"/>
  <rect class="efill e2" x="134" y="98" height="6" rx="3"/>
  <!-- EAP -->
  <rect class="acc" x="76" y="120" width="44" height="18" rx="4"/>
  <text x="98" y="133" font-size="9.5" font-weight="800" fill="#fff" text-anchor="middle" textLength="28" lengthAdjust="spacingAndGlyphs">EAP</text>
  <rect class="acc" x="128" y="126" width="78" height="6" rx="3" opacity="0.14"/>
  <rect class="efill e3" x="128" y="126" height="6" rx="3"/>
</svg>

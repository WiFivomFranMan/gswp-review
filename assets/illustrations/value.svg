<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="A phone joining a Passpoint network automatically and securely">
  <!--
    Section illustration: "value" (Introduction).
    Editable by hand or in Inkscape/draw.io. Colours come from the CSS classes
    below; the fallback hex in each is this section's theme, so the file also
    looks right opened on its own. Animation is pure CSS.
  -->
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg   { fill: var(--soft, #e8f4fb); }
    .acc  { fill: var(--acc, #0b74b1); }
    .sacc { fill: none; stroke: var(--acc, #0b74b1); }
    .soft { fill: var(--soft, #e8f4fb); }
    .ok   { fill: #1aad55; }
    .ink  { fill: #14211f; }
    text  { font-weight: 760; }
    .t  { fill: #14211f; }
    .tm { fill: #60706d; font-weight: 700; }
    .lit { opacity: 0; }
    @keyframes ripple { 0% { r: 6px; opacity: .5; } 80%,100% { r: 50px; opacity: 0; } }
    @keyframes pulse  { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes bar    { 0%,8% { opacity: 0; } 20%,100% { opacity: 1; } }
    @keyframes seal   { 0%,60% { opacity: 0; } 72%,93% { opacity: 1; } 100% { opacity: 0; } }
    .r1 { animation: ripple 2.6s ease-out infinite; }
    .r2 { animation: ripple 2.6s ease-out infinite 1.3s; }
    .dot { animation: pulse 1.4s ease-in-out infinite; }
    .b1 { animation: bar 3.4s ease-in-out infinite; }
    .b2 { animation: bar 3.4s ease-in-out infinite .35s; }
    .b3 { animation: bar 3.4s ease-in-out infinite .7s; }
    .b4 { animation: bar 3.4s ease-in-out infinite 1.05s; }
    .check { animation: seal 3.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .r1,.r2,.dot,.b1,.b2,.b3,.b4,.check { animation: none; }
      .lit { opacity: 1; }
    }
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="90" cy="148" rx="42" ry="6" opacity="0.06"/>
  <ellipse class="ink" cx="222" cy="124" rx="32" ry="5" opacity="0.06"/>

  <!-- discovery ripples from the access point -->
  <circle class="sacc r1" cx="206" cy="90" r="6" stroke-width="2.2"/>
  <circle class="sacc r2" cx="206" cy="90" r="6" stroke-width="2.2"/>

  <!-- access point -->
  <line class="sacc" x1="216" y1="74" x2="212" y2="56" stroke-width="2.5" stroke-linecap="round"/>
  <line class="sacc" x1="244" y1="74" x2="248" y2="56" stroke-width="2.5" stroke-linecap="round"/>
  <circle class="acc" cx="212" cy="54" r="2.6"/>
  <circle class="acc" cx="248" cy="54" r="2.6"/>
  <rect fill="#fff" class="sacc" x="202" y="74" width="54" height="34" rx="7" stroke-width="2.5"/>
  <circle class="ok dot" cx="229" cy="91" r="3.4"/>

  <!-- phone -->
  <rect fill="#fff" class="sacc" x="60" y="38" width="58" height="102" rx="13" stroke-width="2.5"/>
  <rect class="soft" x="67" y="50" width="44" height="78" rx="4"/>
  <rect class="acc" x="80" y="43" width="18" height="3.4" rx="1.7" opacity="0.5"/>

  <!-- signal bars climbing -->
  <g transform="translate(74,80)">
    <rect class="acc" x="0"  y="10" width="5" height="8"  rx="1.2" opacity="0.16"/>
    <rect class="acc" x="10" y="5"  width="5" height="13" rx="1.2" opacity="0.16"/>
    <rect class="acc" x="20" y="-1" width="5" height="19" rx="1.2" opacity="0.16"/>
    <rect class="acc" x="30" y="-7" width="5" height="25" rx="1.2" opacity="0.16"/>
    <rect class="acc lit b1" x="0"  y="10" width="5" height="8"  rx="1.2"/>
    <rect class="acc lit b2" x="10" y="5"  width="5" height="13" rx="1.2"/>
    <rect class="acc lit b3" x="20" y="-1" width="5" height="19" rx="1.2"/>
    <rect class="acc lit b4" x="30" y="-7" width="5" height="25" rx="1.2"/>
  </g>

  <!-- secured padlock confirmation -->
  <g class="lit check" transform="translate(89,113)">
    <circle class="ok" cx="0" cy="0" r="13"/>
    <rect fill="#fff" x="-5" y="-1" width="10" height="8" rx="1.6"/>
    <path d="M-3 -1 v-2.6 a3 3 0 0 1 6 0 v2.6" fill="none" stroke="#fff" stroke-width="1.9"/>
  </g>

  <text class="tm" x="54"  y="164" font-size="10" textLength="46" lengthAdjust="spacingAndGlyphs">Automatic</text>
  <text class="tm" x="146" y="164" font-size="10" textLength="44" lengthAdjust="spacingAndGlyphs">Seamless</text>
  <text class="tm" x="228" y="164" font-size="10" textLength="34" lengthAdjust="spacingAndGlyphs">Secure</text>
</svg>

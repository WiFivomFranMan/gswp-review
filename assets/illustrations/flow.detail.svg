<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img"
     class="flow-detail" data-steps="4" data-step="1"
     aria-label="The four stages of a Passpoint connection"
     data-cap-1="Discovery: the access point beacons that it supports Passpoint, advertising its roaming identifiers (RCOI) before any device joins."
     data-cap-2="ANQP exchange: the device asks the network for details (domain, NAI realm, RCOI) and checks them against its profile, all before it associates."
     data-cap-3="Authentication: on a match the device runs 802.1X / EAP; the login is carried over RadSec to the home identity provider, which verifies it."
     data-cap-4="Connected: keys are derived and the device joins over WPA-Enterprise encryption. No portal, no shared password.">
  <!--
    Detailed connection-process illustration. Stepper-driven: prev/next set
    data-step on this root; CSS reveals the matching .sN group. All selectors are
    namespaced under .flow-detail so several open sections never clash. Editable as
    text or in Inkscape/draw.io; colours fall back to this section's blue theme.
  -->
  <style>
    .flow-detail text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .flow-detail .bg   { fill: var(--acc-soft, #e8f4fb); }
    .flow-detail .acc  { fill: var(--acc, #085d8e); }
    .flow-detail .sacc { fill: none; stroke: var(--acc, #085d8e); }
    .flow-detail .ok   { fill: #1aad55; }
    .flow-detail .oks  { fill: none; stroke: #1aad55; }
    .flow-detail .ink  { fill: #14211f; }
    .flow-detail .tl   { fill: var(--acc, #085d8e); font-weight: 820; }
    .flow-detail .tm   { fill: #60706d; font-weight: 700; }
    .flow-detail .tw   { fill: #fff; font-weight: 800; }
    .flow-detail .wire { stroke: #c4d3da; stroke-width: 3; stroke-linecap: round; }
    .flow-detail .step    { opacity: 0; transition: opacity .4s ease; }
    .flow-detail .title   { opacity: 0; }
    .flow-detail[data-step="1"] .s1, .flow-detail[data-step="1"] .t1,
    .flow-detail[data-step="2"] .s2, .flow-detail[data-step="2"] .t2,
    .flow-detail[data-step="3"] .s3, .flow-detail[data-step="3"] .t3,
    .flow-detail[data-step="4"] .s4, .flow-detail[data-step="4"] .t4 { opacity: 1; }
    @keyframes flowd-rip  { 0% { r: 5px; opacity: .55; } 100% { r: 46px; opacity: 0; } }
    @keyframes flowd-dash { to { stroke-dashoffset: -24; } }
    @keyframes flowd-flow { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    .flow-detail .rip  { animation: flowd-rip 2.4s ease-out infinite; }
    .flow-detail .rip2 { animation: flowd-rip 2.4s ease-out infinite 1.2s; }
    .flow-detail .flowline { stroke-dasharray: 6 7; animation: flowd-dash 1s linear infinite; }
    .flow-detail .pulse { animation: flowd-flow 1.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .flow-detail .rip, .flow-detail .rip2, .flow-detail .flowline, .flow-detail .pulse { animation: none; }
    }
  </style>

  <rect class="bg" width="520" height="300"/>

  <!-- step titles -->
  <text class="tl title t1" x="28" y="40" font-size="17" textLength="150" lengthAdjust="spacingAndGlyphs">1 · Discovery</text>
  <text class="tl title t2" x="28" y="40" font-size="17" textLength="210" lengthAdjust="spacingAndGlyphs">2 · ANQP exchange</text>
  <text class="tl title t3" x="28" y="40" font-size="17" textLength="220" lengthAdjust="spacingAndGlyphs">3 · Authentication</text>
  <text class="tl title t4" x="28" y="40" font-size="17" textLength="170" lengthAdjust="spacingAndGlyphs">4 · Connected</text>

  <!-- persistent wires -->
  <line class="wire" x1="118" y1="168" x2="232" y2="168"/>
  <line class="wire" x1="312" y1="168" x2="416" y2="168"/>

  <!-- device -->
  <rect fill="#fff" class="sacc" x="44" y="104" width="74" height="128" rx="16" stroke-width="2.5"/>
  <rect class="bg" x="52" y="118" width="58" height="100" rx="4"/>
  <text class="tm" x="48" y="252" font-size="12" textLength="70" lengthAdjust="spacingAndGlyphs">Device</text>

  <!-- access point -->
  <line class="sacc" x1="258" y1="118" x2="252" y2="96" stroke-width="2.5" stroke-linecap="round"/>
  <line class="sacc" x1="286" y1="118" x2="292" y2="96" stroke-width="2.5" stroke-linecap="round"/>
  <circle class="acc" cx="252" cy="94" r="3"/>
  <circle class="acc" cx="292" cy="94" r="3"/>
  <rect fill="#fff" class="sacc" x="236" y="118" width="72" height="44" rx="8" stroke-width="2.5"/>
  <circle class="acc" cx="272" cy="140" r="3.4" opacity="0.4"/>
  <text class="tm" x="236" y="252" font-size="12" textLength="98" lengthAdjust="spacingAndGlyphs">Access point</text>

  <!-- identity provider -->
  <rect fill="#fff" class="sacc" x="420" y="110" width="66" height="92" rx="8" stroke-width="2.5"/>
  <path class="sacc" d="M420 138 h66 M420 166 h66" stroke-width="1.5" opacity="0.4"/>
  <circle class="acc" cx="432" cy="124" r="2.6"/>
  <circle class="acc" cx="432" cy="152" r="2.6" opacity="0.4"/>
  <circle class="acc" cx="432" cy="180" r="2.6" opacity="0.4"/>
  <text class="tm" x="404" y="252" font-size="12" textLength="98" lengthAdjust="spacingAndGlyphs">Identity provider</text>

  <!-- STEP 1: discovery beacon -->
  <g class="step s1">
    <circle class="sacc rip"  cx="272" cy="100" r="5" stroke-width="2"/>
    <circle class="sacc rip2" cx="272" cy="100" r="5" stroke-width="2"/>
    <rect class="acc" x="196" y="58" width="152" height="22" rx="11"/>
    <text class="tw" x="272" y="73" font-size="11" text-anchor="middle" textLength="130" lengthAdjust="spacingAndGlyphs">Passpoint · RCOI beacon</text>
  </g>

  <!-- STEP 2: ANQP query + answer card -->
  <g class="step s2">
    <line class="sacc flowline" x1="118" y1="168" x2="232" y2="168" stroke-width="3"/>
    <rect class="acc" x="120" y="120" width="58" height="22" rx="11"/>
    <text class="tw" x="149" y="135" font-size="11" text-anchor="middle" textLength="46" lengthAdjust="spacingAndGlyphs">ANQP?</text>
    <rect fill="#fff" class="sacc" x="330" y="40" width="150" height="74" rx="8" stroke-width="2"/>
    <text class="tl" x="342" y="60" font-size="11" textLength="92" lengthAdjust="spacingAndGlyphs">Network answers</text>
    <circle class="ok" cx="346" cy="76" r="3"/><text class="ink" x="356" y="80" font-size="11" textLength="58" lengthAdjust="spacingAndGlyphs">Domain</text>
    <circle class="ok" cx="346" cy="92" r="3"/><text class="ink" x="356" y="96" font-size="11" textLength="76" lengthAdjust="spacingAndGlyphs">NAI realm</text>
    <circle class="ok" cx="346" cy="108" r="3"/><text class="ink" x="356" y="112" font-size="11" textLength="44" lengthAdjust="spacingAndGlyphs">RCOI</text>
  </g>

  <!-- STEP 3: 802.1X / EAP to the IdP over RadSec -->
  <g class="step s3">
    <line class="sacc flowline" x1="312" y1="168" x2="416" y2="168" stroke-width="3"/>
    <rect class="acc" x="120" y="120" width="74" height="22" rx="11"/>
    <text class="tw" x="157" y="135" font-size="11" text-anchor="middle" textLength="60" lengthAdjust="spacingAndGlyphs">802.1X/EAP</text>
    <g transform="translate(364,168)">
      <rect class="ok" x="-9" y="-2" width="18" height="14" rx="2.5"/>
      <path class="oks" d="M-5 -2 v-4 a5 5 0 0 1 10 0 v4" stroke-width="2"/>
    </g>
    <text class="tm" x="338" y="196" font-size="10" textLength="52" lengthAdjust="spacingAndGlyphs">RadSec</text>
    <g transform="translate(453,124)">
      <circle class="ok" cx="0" cy="0" r="9"/>
      <path d="M-4 0 l3 3 5 -6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- STEP 4: connected over WPA-Enterprise -->
  <g class="step s4">
    <line class="sacc" x1="118" y1="168" x2="232" y2="168" stroke-width="3"/>
    <circle class="acc pulse" cx="150" cy="168" r="4"/>
    <circle class="acc pulse" cx="180" cy="168" r="4"/>
    <circle class="acc pulse" cx="210" cy="168" r="4"/>
    <g transform="translate(175,168)">
      <rect class="ok" x="-10" y="-3" width="20" height="15" rx="2.5"/>
      <path class="oks" d="M-6 -3 v-4 a6 6 0 0 1 12 0 v4" stroke-width="2.2"/>
    </g>
    <rect class="acc" x="120" y="120" width="116" height="22" rx="11"/>
    <text class="tw" x="178" y="135" font-size="11" text-anchor="middle" textLength="100" lengthAdjust="spacingAndGlyphs">WPA-Enterprise</text>
    <g transform="translate(81,168)">
      <circle class="ok" cx="0" cy="0" r="15"/>
      <path d="M-7 0 l5 5 9 -11" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>

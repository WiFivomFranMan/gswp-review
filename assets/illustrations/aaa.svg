<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="Login travels from the access point through a RadSec proxy to the identity provider">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#e8f4fb)} .acc{fill:var(--acc,#085d8e)}
    .sacc{fill:none;stroke:var(--acc,#085d8e)} .ok{fill:#1aad55} .oks{stroke:#1aad55}
    .ink{fill:#14211f} text{font-weight:760} .tm{fill:#60706d;font-weight:700}
    @keyframes travel{
      0%,12%{transform:translateX(0);opacity:0}
      16%{opacity:1}
      42%{transform:translateX(70px);opacity:1}
      56%{transform:translateX(70px);opacity:1}
      86%{transform:translateX(140px);opacity:1}
      100%{transform:translateX(140px);opacity:0}}
    .travel{animation:travel 3.4s ease-in-out infinite;opacity:0}
    @media (prefers-reduced-motion: reduce){.travel{animation:none;opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="46" cy="128" rx="26" ry="5" opacity="0.06"/>
  <ellipse class="ink" cx="234" cy="128" rx="26" ry="5" opacity="0.06"/>

  <!-- access point -->
  <line class="sacc" x1="38" y1="72" x2="34" y2="56" stroke-width="2.5" stroke-linecap="round"/>
  <line class="sacc" x1="58" y1="72" x2="62" y2="56" stroke-width="2.5" stroke-linecap="round"/>
  <rect fill="#fff" class="sacc" x="26" y="72" width="44" height="30" rx="6" stroke-width="2.5"/>
  <circle class="acc" cx="48" cy="87" r="3" opacity="0.4"/>
  <text class="tm" x="38" y="120" font-size="11" textLength="18" lengthAdjust="spacingAndGlyphs">AP</text>

  <!-- RadSec proxy -->
  <rect fill="#fff" class="sacc" x="116" y="60" width="48" height="56" rx="7" stroke-width="2.5"/>
  <path class="sacc" d="M116 79 h48 M116 98 h48" stroke-width="1.5" opacity="0.45"/>
  <circle class="ok" cx="126" cy="70" r="2.2"/>
  <circle class="acc" cx="126" cy="89" r="2.2" opacity="0.4"/>
  <circle class="acc" cx="126" cy="107" r="2.2" opacity="0.4"/>
  <text class="tm" x="112" y="132" font-size="10" textLength="72" lengthAdjust="spacingAndGlyphs">RadSec proxy</text>

  <!-- identity provider -->
  <rect fill="#fff" class="sacc" x="212" y="60" width="44" height="56" rx="7" stroke-width="2.5"/>
  <circle class="acc" cx="234" cy="80" r="7" opacity="0.4"/>
  <path class="acc" d="M223 104 a11 9 0 0 1 22 0" opacity="0.4"/>
  <text class="tm" x="224" y="132" font-size="11" textLength="22" lengthAdjust="spacingAndGlyphs">IdP</text>

  <!-- wire with a TLS padlock -->
  <path class="sacc" d="M70 88 h44 M166 88 h44" stroke-width="2.5" stroke-linecap="round"/>
  <g transform="translate(188,88)">
    <rect class="ok" x="-7" y="-2" width="14" height="11" rx="2"/>
    <path class="oks" d="M-4 -2 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke-width="2"/>
  </g>

  <!-- request travelling AP -> proxy -> IdP -->
  <circle class="acc travel" cx="70" cy="88" r="5"/>
</svg>

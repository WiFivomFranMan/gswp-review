<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="Passpoint is enterprise Wi-Fi: WPA-Enterprise, 802.1X EAP and dynamic keys">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#fff5f5)} .acc{fill:var(--acc,#e53e3e)}
    .sacc{fill:none;stroke:var(--acc,#e53e3e)} .ink{fill:#14211f}
    text{font-weight:760} .t{fill:#14211f} .tm{fill:#60706d;font-weight:700}
    .fill{fill:#1aad55;opacity:0}
    .hl{fill:none;stroke:#1aad55;stroke-width:2.5;opacity:0}
    @keyframes shieldfill{0%,66%{opacity:0}82%,100%{opacity:.14}}
    @keyframes r1{0%,12%{opacity:0}22%,100%{opacity:1}}
    @keyframes r2{0%,32%{opacity:0}42%,100%{opacity:1}}
    @keyframes r3{0%,52%{opacity:0}62%,100%{opacity:1}}
    .sf{animation:shieldfill 4s ease-in-out infinite}
    .l1{animation:r1 4s ease-in-out infinite}
    .l2{animation:r2 4s ease-in-out infinite}
    .l3{animation:r3 4s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){.fill,.hl{animation:none}.hl{opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="95" cy="152" rx="40" ry="6" opacity="0.05"/>

  <!-- shield + padlock -->
  <path fill="#fff" class="sacc" d="M95 36 L128 49 V90 C128 114 113 129 95 138 C77 129 62 114 62 90 V49 Z" stroke-width="2.5"/>
  <path class="fill sf" d="M95 36 L128 49 V90 C128 114 113 129 95 138 C77 129 62 114 62 90 V49 Z"/>
  <rect class="acc" x="85" y="88" width="20" height="16" rx="3"/>
  <path class="sacc" d="M89 88 v-5 a6 6 0 0 1 12 0 v5" stroke-width="3"/>
  <circle fill="#fff" cx="95" cy="95" r="2.4"/>
  <text class="tm" x="66" y="158" font-size="9" textLength="58" lengthAdjust="spacingAndGlyphs">Enterprise Wi-Fi</text>

  <!-- security layers -->
  <rect fill="#fff" class="sacc" x="150" y="44"  width="106" height="24" rx="6" stroke-width="2"/>
  <rect fill="#fff" class="sacc" x="150" y="78"  width="106" height="24" rx="6" stroke-width="2"/>
  <rect fill="#fff" class="sacc" x="150" y="112" width="106" height="24" rx="6" stroke-width="2"/>
  <text class="t" x="162" y="60"  font-size="11" textLength="86" lengthAdjust="spacingAndGlyphs">WPA-Enterprise</text>
  <text class="t" x="162" y="94"  font-size="11" textLength="72" lengthAdjust="spacingAndGlyphs">802.1X / EAP</text>
  <text class="t" x="162" y="128" font-size="11" textLength="74" lengthAdjust="spacingAndGlyphs">Dynamic keys</text>
  <rect class="hl l1" x="150" y="44"  width="106" height="24" rx="6"/>
  <rect class="hl l2" x="150" y="78"  width="106" height="24" rx="6"/>
  <rect class="hl l3" x="150" y="112" width="106" height="24" rx="6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="From captive-portal sign-in to automatic Passpoint join">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#fffbeb)} .acc{fill:var(--acc,#d97706)}
    .sacc{fill:none;stroke:var(--acc,#d97706)} .soft{fill:var(--soft,#fffbeb)}
    .ok{fill:#1aad55} .ink{fill:#14211f}
    text{font-weight:760} .t{fill:#14211f} .tm{fill:#60706d;font-weight:700}
    @keyframes pulse{0%,100%{opacity:.8}50%{opacity:1}}
    .dot{animation:pulse 1.8s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){.dot{animation:none}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="74" cy="142" rx="44" ry="6" opacity="0.06"/>
  <ellipse class="ink" cx="212" cy="142" rx="30" ry="6" opacity="0.06"/>

  <!-- captive-portal browser -->
  <rect fill="#fff" class="sacc" x="22" y="44" width="104" height="86" rx="8" stroke-width="2.5"/>
  <path class="sacc" d="M22 59 h104" stroke-width="2.5"/>
  <circle class="acc" cx="33" cy="51" r="2.4" opacity="0.5"/>
  <circle class="acc" cx="41" cy="51" r="2.4" opacity="0.5"/>
  <circle class="acc" cx="49" cy="51" r="2.4" opacity="0.5"/>
  <rect class="soft sacc" x="36" y="70" width="76" height="9" rx="3" stroke-width="1.5"/>
  <rect class="soft sacc" x="36" y="85" width="76" height="9" rx="3" stroke-width="1.5"/>
  <rect class="acc" x="62" y="102" width="50" height="15" rx="4"/>
  <text x="87" y="113" font-size="8" font-weight="800" fill="#fff" text-anchor="middle"
        textLength="40" lengthAdjust="spacingAndGlyphs">SIGN IN</text>
  <text class="tm" x="38" y="141" font-size="10" textLength="74" lengthAdjust="spacingAndGlyphs">Captive portal</text>

  <!-- becomes -->
  <path class="sacc" d="M134 88 h18" stroke-width="3" stroke-linecap="round"/>
  <path class="sacc" d="M148 82 l8 6 -8 6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- phone, joined -->
  <rect fill="#fff" class="sacc" x="184" y="46" width="56" height="84" rx="12" stroke-width="2.5"/>
  <rect class="soft" x="191" y="58" width="42" height="60" rx="4"/>
  <g transform="translate(212,82)">
    <circle class="ok dot" cx="0" cy="0" r="15"/>
    <path d="M-6 0 l4 4 8 -9" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="tm" x="194" y="141" font-size="10" textLength="52" lengthAdjust="spacingAndGlyphs">Passpoint</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="The Wi-Fi list shows the profile's display name; the device joins automatically when it matches, no tapping needed">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#fffbeb)} .acc{fill:var(--acc,#0b74b1)}
    .sacc{fill:none;stroke:var(--acc,#0b74b1)} .soft{fill:var(--soft,#fffbeb)}
    .ok{fill:#1aad55} .ink{fill:#14211f}
    text{font-weight:760} .tm{fill:#60706d;font-weight:700}
    @keyframes cjoin{0%,30%{opacity:0}42%,88%{opacity:1}100%{opacity:0}}
    @keyframes cwave{0%,30%{opacity:0.25}42%,88%{opacity:1}100%{opacity:0.25}}
    .join{animation:cjoin 3.6s ease-in-out infinite;opacity:0}
    .wave{animation:cwave 3.6s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){.join,.wave{animation:none}.join{opacity:1}.wave{opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="79" cy="164" rx="42" ry="5" opacity="0.06"/>

  <!-- device with its Wi-Fi list -->
  <rect fill="#fff" class="sacc" x="35" y="16" width="88" height="144" rx="13" stroke-width="2.5"/>
  <text class="tm" x="45" y="38" font-size="8" textLength="38" lengthAdjust="spacingAndGlyphs">Wi-Fi list</text>

  <!-- plain nearby network -->
  <rect class="soft" x="45" y="46" width="68" height="22" rx="5"/>
  <text class="tm" x="51" y="60" font-size="8" textLength="48" lengthAdjust="spacingAndGlyphs">Coffee-Guest</text>

  <!-- the Passpoint entry: name from the profile -->
  <rect fill="#fff" class="sacc" x="45" y="76" width="68" height="26" rx="5" stroke-width="2"/>
  <text class="ink" x="51" y="92" font-size="8" textLength="46" lengthAdjust="spacingAndGlyphs">MyOperator</text>
  <g class="wave" transform="translate(103,90)">
    <path class="sacc" d="M-5 2 a7 7 0 0 1 10 0" stroke-width="1.8" stroke-linecap="round"/>
    <circle class="acc" cx="0" cy="4" r="1.6"/>
  </g>

  <!-- another plain network -->
  <rect class="soft" x="45" y="110" width="68" height="22" rx="5"/>
  <text class="tm" x="51" y="124" font-size="8" textLength="44" lengthAdjust="spacingAndGlyphs">Airport Free</text>

  <!-- callout: the name is from the profile -->
  <path class="sacc" d="M118 89 h22" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text class="tm" x="146" y="76" font-size="9" textLength="104" lengthAdjust="spacingAndGlyphs">This name comes from</text>
  <text class="tm" x="146" y="88" font-size="9" textLength="102" lengthAdjust="spacingAndGlyphs">the installed profile,</text>
  <text class="tm" x="146" y="100" font-size="9" textLength="86" lengthAdjust="spacingAndGlyphs">not a nearby SSID</text>

  <!-- auto-join result -->
  <g class="join">
    <g transform="translate(154,126)">
      <circle class="ok" cx="0" cy="0" r="12"/>
      <path d="M-5 0 l3.5 3.5 7 -8" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text class="ink" x="172" y="123" font-size="9" textLength="88" lengthAdjust="spacingAndGlyphs">Joins by itself when</text>
    <text class="ink" x="172" y="135" font-size="9" textLength="94" lengthAdjust="spacingAndGlyphs">matched, no tapping</text>
  </g>
</svg>

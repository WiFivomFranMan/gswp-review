<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 178" role="img"
     aria-label="ANQP matches the device against domain, NAI realm, RCOI and PLMN">
  <style>
    svg { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg{fill:var(--soft,#e8faf1)} .acc{fill:var(--acc,#1aad55)}
    .sacc{fill:none;stroke:var(--acc,#1aad55)} .ink{fill:#14211f}
    text{font-weight:760} .t{fill:#14211f} .ta{fill:var(--acc,#1aad55);font-weight:820}
    .ring{fill:none;stroke:var(--acc,#1aad55);stroke-width:1.5;opacity:.25}
    .chk{opacity:0}
    @keyframes c1{0%,18%{opacity:0}28%,100%{opacity:1}}
    @keyframes c2{0%,34%{opacity:0}44%,100%{opacity:1}}
    @keyframes c3{0%,50%{opacity:0}60%,100%{opacity:1}}
    @keyframes c4{0%,66%{opacity:0}76%,100%{opacity:1}}
    .k1{animation:c1 4s ease-in-out infinite}
    .k2{animation:c2 4s ease-in-out infinite}
    .k3{animation:c3 4s ease-in-out infinite}
    .k4{animation:c4 4s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){.chk{animation:none;opacity:1}}
  </style>

  <rect class="bg" width="280" height="178"/>
  <ellipse class="ink" cx="140" cy="160" rx="86" ry="6" opacity="0.05"/>
  <rect fill="#fff" class="sacc" x="64" y="24" width="152" height="128" rx="10" stroke-width="2.5"/>
  <path class="sacc" d="M64 50 h152" stroke-width="2"/>
  <text class="ta" x="80" y="42" font-size="12" textLength="92" lengthAdjust="spacingAndGlyphs">ANQP match</text>
  <circle class="acc" cx="198" cy="37" r="6" opacity="0.18"/>

  <text class="t" x="82" y="73"  font-size="12" textLength="60" lengthAdjust="spacingAndGlyphs">Domain</text>
  <text class="t" x="82" y="97"  font-size="12" textLength="84" lengthAdjust="spacingAndGlyphs">NAI Realm</text>
  <text class="t" x="82" y="121" font-size="12" textLength="42" lengthAdjust="spacingAndGlyphs">RCOI</text>
  <text class="t" x="82" y="145" font-size="12" textLength="48" lengthAdjust="spacingAndGlyphs">PLMN</text>

  <circle class="ring" cx="194" cy="69"  r="8"/>
  <circle class="ring" cx="194" cy="93"  r="8"/>
  <circle class="ring" cx="194" cy="117" r="8"/>
  <circle class="ring" cx="194" cy="141" r="8"/>

  <g class="chk k1"><circle class="acc" cx="194" cy="69"  r="8"/><path d="M190 69 l3 3 5 -6"  fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  <g class="chk k2"><circle class="acc" cx="194" cy="93"  r="8"/><path d="M190 93 l3 3 5 -6"  fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  <g class="chk k3"><circle class="acc" cx="194" cy="117" r="8"/><path d="M190 117 l3 3 5 -6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  <g class="chk k4"><circle class="acc" cx="194" cy="141" r="8"/><path d="M190 141 l3 3 5 -6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img"
     class="tl-detail" data-steps="3" data-step="1"
     aria-label="Evolution from captive portals to Hotspot 2.0 to Passpoint"
     data-cap-1="Before Passpoint: open Wi-Fi plus a captive-portal web page (WISPr). The user finds the SSID and signs in by hand every time."
     data-cap-2="Hotspot 2.0 added pre-association discovery (ANQP): the device can ask the network about itself before deciding to join."
     data-cap-3="Passpoint brings it together: with a profile the device discovers, matches and joins trusted Wi-Fi automatically and securely - no portal.">
  <style>
    .tl-detail text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .tl-detail .bg{fill:var(--soft,#fffbeb)} .tl-detail .acc{fill:var(--acc,#d97706)}
    .tl-detail .sacc{fill:none;stroke:var(--acc,#d97706)} .tl-detail .ink{fill:#14211f}
    .tl-detail .ok{fill:#1aad55} .tl-detail .tl{fill:var(--acc,#d97706);font-weight:820}
    .tl-detail .tm{fill:#60706d;font-weight:700} .tl-detail .tw{fill:#fff;font-weight:800}
    .tl-detail .step{opacity:0;transition:opacity .35s ease} .tl-detail .title{opacity:0}
    .tl-detail .stage{opacity:.45;transition:opacity .35s}
    .tl-detail[data-step="1"] .s1, .tl-detail[data-step="1"] .t1, .tl-detail[data-step="1"] .g1,
    .tl-detail[data-step="2"] .s2, .tl-detail[data-step="2"] .t2, .tl-detail[data-step="2"] .g2,
    .tl-detail[data-step="3"] .s3, .tl-detail[data-step="3"] .t3, .tl-detail[data-step="3"] .g3 { opacity: 1; }
  </style>

  <rect class="bg" width="520" height="300"/>
  <text class="tl title t1" x="28" y="40" font-size="17" textLength="230" lengthAdjust="spacingAndGlyphs">1 · Captive portal</text>
  <text class="tl title t2" x="28" y="40" font-size="17" textLength="200" lengthAdjust="spacingAndGlyphs">2 · Hotspot 2.0</text>
  <text class="tl title t3" x="28" y="40" font-size="17" textLength="170" lengthAdjust="spacingAndGlyphs">3 · Passpoint</text>

  <!-- progression arrows -->
  <path class="sacc" d="M178 160 h12 M186 155 l6 5 -6 5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="sacc" d="M330 160 h12 M338 155 l6 5 -6 5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- stage 1: captive portal -->
  <g class="stage g1">
    <rect fill="#fff" class="sacc" x="42" y="96" width="134" height="128" rx="10" stroke-width="2.2"/>
    <rect fill="#fff" class="sacc" x="62" y="116" width="94" height="62" rx="5" stroke-width="1.8"/>
    <path class="sacc" d="M62 128 h94" stroke-width="1.8"/>
    <rect class="acc" x="92" y="156" width="36" height="13" rx="3"/>
    <text class="tw" x="110" y="166" font-size="7.5" text-anchor="middle" textLength="28" lengthAdjust="spacingAndGlyphs">SIGN IN</text>
    <text class="ink" x="64" y="200" font-size="12" font-weight="800" textLength="84" lengthAdjust="spacingAndGlyphs">Captive portal</text>
    <text class="tm" x="64" y="215" font-size="11" textLength="40" lengthAdjust="spacingAndGlyphs">WISPr</text>
  </g>
  <!-- stage 2: Hotspot 2.0 -->
  <g class="stage g2">
    <rect fill="#fff" class="sacc" x="194" y="96" width="134" height="128" rx="10" stroke-width="2.2"/>
    <rect fill="#fff" class="sacc" x="234" y="112" width="40" height="62" rx="7" stroke-width="1.8"/>
    <circle class="acc" cx="296" cy="130" r="12"/>
    <text class="tw" x="296" y="135" font-size="14" text-anchor="middle">?</text>
    <text class="ink" x="216" y="200" font-size="12" font-weight="800" textLength="90" lengthAdjust="spacingAndGlyphs">Hotspot 2.0</text>
    <text class="tm" x="216" y="215" font-size="11" textLength="92" lengthAdjust="spacingAndGlyphs">ANQP discovery</text>
  </g>
  <!-- stage 3: Passpoint -->
  <g class="stage g3">
    <rect fill="#fff" class="sacc" x="346" y="96" width="134" height="128" rx="10" stroke-width="2.2"/>
    <rect fill="#fff" class="sacc" x="386" y="112" width="40" height="62" rx="7" stroke-width="1.8"/>
    <g transform="translate(406,143)"><circle class="ok" cx="0" cy="0" r="13"/><path d="M-6 0 l4 4 8 -9" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></g>
    <text class="ink" x="368" y="200" font-size="12" font-weight="800" textLength="84" lengthAdjust="spacingAndGlyphs">Passpoint</text>
    <text class="tm" x="368" y="215" font-size="11" textLength="76" lengthAdjust="spacingAndGlyphs">automatic</text>
  </g>

  <!-- per-step highlight rings -->
  <g class="step s1"><rect class="sacc" x="42" y="96" width="134" height="128" rx="10" stroke-width="3"/></g>
  <g class="step s2"><rect class="sacc" x="194" y="96" width="134" height="128" rx="10" stroke-width="3"/></g>
  <g class="step s3"><rect class="sacc" x="346" y="96" width="134" height="128" rx="10" stroke-width="3"/></g>
</svg>
